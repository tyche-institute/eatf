name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO sign-off check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check every PR commit carries Signed-off-by
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              author="$(git log -1 --format='%an <%ae>' "$sha")"
              echo "::error::commit $sha by $author is missing a Signed-off-by trailer"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "DCO check failed: $missing commit(s) missing sign-off."
            echo "Amend with: git commit --amend -s    or rebase with: git rebase --signoff origin/main"
            exit 1
          fi
          echo "DCO check passed."

  schema-validate:
    name: JSON Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3
      - name: Compile schemas (sanity check; draft-2020-12)
        run: |
          set -euo pipefail
          # --spec=draft2020 is required because both schemas declare
          # $schema = https://json-schema.org/draft/2020-12/schema and
          # ajv-cli defaults to draft-07.
          for schema in schemas/aep-v1.schema.json schemas/overt-receipt-v1.schema.json; do
            ajv compile --strict=false --spec=draft2020 -c ajv-formats -s "$schema"
          done
      - name: Validate metadata.json + overt_receipt.json from every conformance vector
        run: |
          set -euo pipefail
          mkdir -p /tmp/aep-meta /tmp/aep-overt
          for vector in test-vectors/valid/*/package.aep test-vectors/invalid/*/package.aep; do
            name=$(basename "$(dirname "$vector")")
            unzip -p "$vector" metadata.json > "/tmp/aep-meta/${name}.json"
            unzip -p "$vector" overt_receipt.json > "/tmp/aep-overt/${name}.json"
            echo "validating $vector"
            ajv validate --strict=false --spec=draft2020 -c ajv-formats \
              -s schemas/aep-v1.schema.json -d "/tmp/aep-meta/${name}.json"
            ajv validate --strict=false --spec=draft2020 -c ajv-formats \
              -s schemas/overt-receipt-v1.schema.json -d "/tmp/aep-overt/${name}.json"
          done

  verifier-test:
    name: Verifier unit tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: lib
        run: npm install --no-audit --no-fund
      - name: Build (tsc)
        working-directory: lib
        run: npm run build
      - name: Run vitest
        working-directory: lib
        run: npx vitest run

  conformance:
    name: Test-vector conformance (real verifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the verifier
        working-directory: lib
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Wire up the CLI
        working-directory: cli/eatf-verify
        run: npm install --no-audit --no-fund
      - name: Run eatf-verify --conformance against test-vectors/
        run: |
          set -euo pipefail
          node cli/eatf-verify/bin/eatf-verify.js --conformance test-vectors/

  roundtrip:
    name: Sign-then-verify round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the verifier (includes the signer)
        working-directory: lib
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Wire up the CLIs
        run: |
          (cd cli/eatf-verify && npm install --no-audit --no-fund)
          (cd cli/eatf-sign && npm install --no-audit --no-fund)
      - name: Sign a fixture payload with the bundled dev key
        run: |
          set -euo pipefail
          echo "EATF CI round-trip: signed with dev-rsa-4096." > /tmp/ci-payload.txt
          cat > /tmp/ci-meta.json <<'JSON'
          {
            "schema": "urn:eatf:spec:aep:metadata:1.0",
            "attestation_id": "att_ci_roundtrip_01",
            "created_at": "2026-05-15T20:00:00Z",
            "agent_id": "urn:eatf:tenant:demo:agent:ci-roundtrip",
            "action_type": "foundational:aep-response",
            "policy_id": "atap-basic",
            "policy_version": "1.0",
            "policy_coverage": 1.0,
            "policy_decision": "allow",
            "format_version": "ATAP-1.0"
          }
          JSON
          node cli/eatf-sign/bin/eatf-sign.js \
            --payload /tmp/ci-payload.txt \
            --key test-vectors/keys/dev-rsa-4096.key \
            --public-key test-vectors/keys/dev-rsa-4096.pem \
            --metadata /tmp/ci-meta.json \
            --scope foundational:aep-response \
            --timestamp test-vectors/valid/valid-overt-profile/package.aep:timestamp.tsr \
            --out /tmp/ci-roundtrip.aep
      - name: Verify what was just signed
        run: |
          set -euo pipefail
          node cli/eatf-verify/bin/eatf-verify.js /tmp/ci-roundtrip.aep
      - name: Verify the committed minimal-roundtrip vector
        run: |
          set -euo pipefail
          node cli/eatf-verify/bin/eatf-verify.js test-vectors/valid/minimal-roundtrip/package.aep

  python-verifier:
    name: Python verifier (lib-python) — conformance + pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the Python verifier with dev extras
        working-directory: lib-python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest — fresh-port conformance against shared test-vectors/
        working-directory: lib-python
        run: pytest -q
      - name: CLI conformance — exit code parity with the TS verifier
        run: |
          set -euo pipefail
          eatf-verify-py --conformance test-vectors/

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden build artefacts in tree
        shell: bash
        run: |
          set -euo pipefail
          bad=$(git ls-files | grep -E '(^|/)(node_modules|dist|build|target|__pycache__|\.venv)(/|$)' || true)
          if [ -n "$bad" ]; then
            printf 'Forbidden artefacts checked in:\n%s\n' "$bad"
            exit 1
          fi
          echo "Hygiene check passed."
